            }

            }

            35% {

            }

            75% {
                transform: translateX(-50%) translateY(calc(-30% + 0.8px)) scale(0.999)

            }

            75% {

            }

            </div>
            <div class="music-control-row">
                <button id="music-play-btn" class="music-control-btn"><i class="fas fa-play"></i><span>播放</span></button>
                <button id="music-next-btn" class="music-control-btn"><i class="fas fa-forward"></i><span>下一首</span></button>
                <button id="music-mode-btn" class="music-control-btn"><i class="fas fa-random"></i><span class="mode-label">顺序播放</span></button>
            </div>
        </div>
        <div id="settings-menu" class="settings-popover">
            <div class="settings-section">
                <label>主题切换</label>
                <div class="theme-buttons-container">
                    <button data-theme="light" class="theme-btn" title="浅色主题">
                        <i class="fas fa-sun"></i>
                    </button>
                    <button data-theme="dark" class="theme-btn active" title="深色主题">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button data-theme="glass" class="theme-btn" title="毛玻璃">
                        <i class="fas fa-layer-group"></i>
                    </button>
                </div>
                <div class="background-color-section">
                    <label>舞台背景颜色</label>
                    <div class="background-color-buttons">
                        <button class="background-color-btn" data-bg-key="aurora">
                            <span class="background-color-swatch" style="--swatch-color: #101828;"></span>
                            <span class="background-color-label">暮蓝·靛青</span>
                        </button>
                        <button class="background-color-btn" data-bg-key="velvet">
                            <span class="background-color-swatch" style="--swatch-color: #2b0f3a;"></span>
                            <span class="background-color-label">绛紫·暮霞</span>
                        </button>
                        <button class="background-color-btn" data-bg-key="linen">
                            <span class="background-color-swatch" style="--swatch-color: #f4ecd8;"></span>
                            <span class="background-color-label">奶油·暖沙</span>
                        </button>
                    </div>
                </div>
            </div>
            <div class="settings-section visual-effects-section">
                <div class="section-header">
                    <i class="fas fa-magic"></i>
                    <label class="section-title">视觉音效</label>
                </div>
                <div class="settings-options">
                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">
                                <i class="fas fa-lungs"></i>
                                角色呼吸效果
                            </div>
                            <div class="setting-description">为角色立绘添加微妙的呼吸动画效果</div>
                        </div>
                        <div class="setting-control">
                            <label class="modern-toggle">
                                <input type="checkbox" id="breathing-toggle" checked="checked">
                                <div class="toggle-track">
                                    <div class="toggle-thumb">
                                        <i class="toggle-icon fas fa-check"></i>
                                    </div>
                                </div>
                            </label>
                        </div>
                    </div>
                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">
                                <i class="fas fa-keyboard"></i>
                                键盘快捷键
                            </div>
                            <div class="setting-description">空格/方向键推进对话</div>
                        </div>
                        <div class="setting-control">
                            <label class="modern-toggle">
                                <input type="checkbox" id="keyboard-shortcuts-toggle">
                                <div class="toggle-track">
                                    <div class="toggle-thumb">
                                        <i class="toggle-icon fas fa-check"></i>
                                    </div>
                                </div>
                            </label>
                        </div>
                    </div>
                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">
                                <i class="fas fa-expand"></i>
                                双击全屏
                            </div>
                            <div class="setting-description">双击空白区域进入全屏模式</div>
                        </div>
                        <div class="setting-control">
                            <label class="modern-toggle">
                                <input type="checkbox" id="fullscreen-toggle">
                                <div class="toggle-track">
                                    <div class="toggle-thumb">
                                        <i class="toggle-icon fas fa-check"></i>
                                    </div>
                                </div>
                            </label>
                        </div>
                    </div>
                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">
                                <i class="fas fa-compact-disc"></i>
                                音乐盒 开启/关闭
                            </div>
                            <div class="setting-description">开启后显示音乐按钮，并可打开歌单播放器</div>
                        </div>
                        <div class="setting-control">
                            <label class="modern-toggle">
                                <input type="checkbox" id="musicbox-toggle" checked="checked">
                                <div class="toggle-track">
                                    <div class="toggle-thumb">
                                        <i class="toggle-icon fas fa-check"></i>
                                    </div>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="settings-section text-settings-section">
                <div class="section-header">
                    <i class="fas fa-font"></i>
                    <label class="section-title">文字设置</label>
                </div>
                <div class="settings-options">
                <!-- 字体选择器放在这里 -->
                <div class="setting-item">
                    <div class="setting-info">
                        <div class="setting-name">
                            <i class="fas fa-palette"></i>
                            界面字体
                        </div>
                        <div class="setting-description">选择整体界面的显示字体</div>
                    </div>
                    <div class="setting-control">
                        <select id="font-selector" class="modern-select">
                            <option value="'Noto Sans SC', sans-serif">现代简约 (默认)</option>
                            <option value="'Kaiti SC', serif">典雅宋体</option>
                            <option value="'Dancing Script', cursive">灵动飘逸</option>
                            <option value="'ZCOOL KuaiLe', cursive">活泼可爱</option>
                            <option value="'Press Start 2P', cursive">像素复古</option>
                            <option value="'Heiti SC', sans-serif">粗犷黑体</option>
                        </select>
                        <div class="font-preview">预览：选择的字体将应用到整个界面</div>
                    </div>
                </div>
                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">
                                <i class="fas fa-keyboard"></i>
                                文字显示效果
                            </div>
                            <div class="setting-description">选择文字出现的动画效果</div>
                        </div>
                        <div class="setting-control">
                            <select id="text-animation-type" class="modern-select">
                                <option value="typewriter">打字机效果</option>
                                <option value="fade">渐显效果</option>
                                <option value="instant">即时显示</option>
                            </select>
                        </div>
                    </div>
                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">
                                <i class="fas fa-tachometer-alt"></i>
                                文字速度
                            </div>
                            <div class="setting-description">调整文字出现的速度</div>
                        </div>
                        <div class="setting-control">
                            <div class="slider-container">
                                <input type="range" id="text-speed-slider" class="modern-slider" min="10" max="200" value="180" step="10">
                                <div class="slider-labels">
                                    <span>慢</span>
                                    <span id="text-speed-value">30ms</span>
                                    <span>快</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-name">
                                <i class="fas fa-text-height"></i>
                                字体大小
                            </div>
                            <div class="setting-description">调整对话文字的大小</div>
                        </div>
                        <div class="setting-control">
                            <div class="slider-container">
                                <input type="range" id="font-size-slider" class="modern-slider" min="12" max="32" value="16" step="2">
                                <div class="slider-labels">
                                    <span>小</span>
                                    <span id="font-size-value">16px</span>
                                    <span>大</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="settings-section default-settings-section">
                <div class="settings-options">
                    <div class="setting-item reset-setting-item">
                        <div class="setting-control">
                            <button id="reset-settings-btn" class="reset-btn">恢复默认</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
